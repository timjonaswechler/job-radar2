scope:
  summary: "Phase 4: make system profile detection testable, harden built-in profiles with deterministic evidence, and make profiles portable via JSON import/export."
  nonGoals:
    - "Do not reintroduce system-specific Rust adapters for Greenhouse, Lever, Ashby, Workday, Personio, SuccessFactors, Phenom, MUZ, or any company-specific career portal."
    - "Do not use company-domain-only mappings or confidence scoring as a substitute for required technical evidence."
    - "Do not build a marketplace, remote registry, or bulk synchronization flow for system profiles."
    - "Do not make the local development database a durable product data store; keep the disposable-dev-DB decision intact."
    - "Do not implement full job extraction runners unless explicitly required by an issue's acceptance criteria."
  futureIssues:
    - "Browser-only system profile checks for sites that cannot reveal enough evidence through HTTP fixtures."
    - "A full system profile authoring wizard beyond test/import/export flows."
    - "Remote/community profile registry and profile signing or trust model."
    - "Actual job extraction execution for every hardened profile, if not already provided by the declarative runtime."

workflow:
  implementationSkill: tdd
  oneIssuePerCommit: true
  sequentialOnly: true
  requireCleanWorktree: true
  allowParallelImplementation: false
  planGate: false

review:
  beforeCommit: true
  acceptanceReviewerCommits: true
  reviewerCanEditSource: false
  reviewerSkill: review
  mode: single-neutral
  fixedPoint: issueStartHead
  maxFixReviewCycles: 2
  comparisonSources:
    - githubIssueAcceptanceCriteria
    - githubIssueBodyAndComments
    - githubIssueLinksLabelsAndBlockers
    - manifestScopeAndNonGoals
    - manifestFutureIssues
    - manifestReferences
    - workerReportAsClaimsOnly
    - currentUncommittedDiff
    - testsAndCommandOutput
  mustRejectIf:
    - acceptanceCriteriaMissingOrAmbiguous
    - missingOrUnmetAcceptanceCriterion
    - scopeCreepOrFutureIssueWork
    - failingOrInsufficientTests
    - reviewerWouldNeedToEditSource
    - impureIssueCommit
    - productArchitectureOrApiDecisionNeeded
  blockOn:
    - acceptanceCriteriaMissing
    - scopeCreep
    - failingOrInsufficientTests
    - regressionRisk
    - impureIssueCommit

remote:
  pushAfterCommit: true
  commentOnIssue: true
  commentTemplate: default

commit:
  conventionalCommit: true
  includeIssueNumber: true
  requireScopeCheck: true

stopIf:
  - dirtyWorktree
  - issueBlocked
  - testsFailAfterFixAttempt
  - scopeUnclear
  - architectureDecisionNeeded
  - acceptanceReviewBlocked

report:
  finalTable: true
  includeTests: true
  includeRisks: true
