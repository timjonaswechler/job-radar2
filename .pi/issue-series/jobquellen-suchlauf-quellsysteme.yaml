scope:
  summary: "Implement the AFK-ready Jobquellen and Suchlauf source flow: configure Jobquellen from Quellsystem metadata, run HTTP adapters, filter and dedupe Fundstellen, and make Suchläufe transparent."
  nonGoals:
    - "Do not implement browser-based portal automation such as StepStone/Playwright in this series. Issue #8 is the HITL research/decision gate for that."
    - "Do not introduce a hosted backend, accounts, profiles, or a standalone web product. Keep phase-one local-first Tauri/Rust + SQLite scope."
    - "Do not store raw HTML snapshots; Stellenanzeigen keep bounded plain-text descriptions only."
    - "Do not add fuzzy title deduplication or broad semantic matching. Prefer conservative dedupe that avoids false merges."
    - "Do not use live network calls in tests; use fixtures, fake fetchers, or local test seams."
  futureIssues:
    - "#8 Browser-basierte Portalquellen für Job Radar entscheiden"

workflow:
  implementationSkill: tdd
  oneIssuePerCommit: true
  sequentialOnly: true
  requireCleanWorktree: true
  allowParallelImplementation: false
  planGate: false

review:
  beforeCommit: true
  acceptanceReviewerCommits: true
  reviewerCanEditSource: false
  reviewerSkill: review
  mode: single-neutral
  fixedPoint: issueStartHead
  maxFixReviewCycles: 2
  comparisonSources:
    - githubIssueAcceptanceCriteria
    - githubIssueBodyAndComments
    - githubIssueLinksLabelsAndBlockers
    - manifestScopeAndNonGoals
    - manifestFutureIssues
    - manifestReferences
    - workerReportAsClaimsOnly
    - currentUncommittedDiff
    - testsAndCommandOutput
  mustRejectIf:
    - acceptanceCriteriaMissingOrAmbiguous
    - missingOrUnmetAcceptanceCriterion
    - scopeCreepOrFutureIssueWork
    - failingOrInsufficientTests
    - reviewerWouldNeedToEditSource
    - impureIssueCommit
    - productArchitectureOrApiDecisionNeeded
  blockOn:
    - acceptanceCriteriaMissing
    - scopeCreep
    - failingOrInsufficientTests
    - regressionRisk
    - impureIssueCommit

remote:
  pushAfterCommit: true
  commentOnIssue: true
  commentTemplate: default

commit:
  conventionalCommit: true
  includeIssueNumber: true
  requireScopeCheck: true

stopIf:
  - dirtyWorktree
  - issueBlocked
  - testsFailAfterFixAttempt
  - scopeUnclear
  - architectureDecisionNeeded
  - acceptanceReviewBlocked

report:
  finalTable: true
  includeTests: true
  includeRisks: true
