name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  desktop-build:
    name: Desktop build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Agent credential safeguard self-tests
        run: npm run test:agent-credential-safety

      - name: Scan tracked snapshot for agent credentials
        run: npm run check:agent-credentials

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Frontend contract tests
        run: |
          npm run test:source-ui
          npm run test:postings-ui
          npm run test:window-platform

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Tauri desktop bundle
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri -- build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundles-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
